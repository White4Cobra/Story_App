

<!DOCTYPE html>
<html>
<head> <link rel="manifest" href="manifest.json"> 
<meta charset="UTF-8">
<title>Story App</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: #eaeaea;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  padding: 15px;
  font-size: 18px;
  border-bottom: 1px solid #2a2a2a;
  text-align: center;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
}

.message {
  max-width: 80%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 12px;
  line-height: 1.5;
  white-space: pre-line;
}

.user {
  background: #2f6df6;
  margin-left: auto;
}

.ai {
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
}

#controls {
  padding: 10px;
  border-top: 1px solid #2a2a2a;
  background: #121212;
}

select, input {
  width: 100%;
  margin-bottom: 8px;
  padding: 8px;
  border-radius: 8px;
  border: none;
  background: #1a1a1a;
  color: white;
}

#inputArea {
  display: flex;
  gap: 8px;
  padding: 10px;
  border-top: 1px solid #2a2a2a;
}

textarea {
  flex: 1;
  resize: none;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #1a1a1a;
  color: white;
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #2f6df6;
  color: white;
}

#secondary {
  background: #444;
}
</style>
</head>

<body>

<header>Story Chat</header>

<div id="chat"></div>

<div id="controls">

<select id="profiles"></select>
<button onclick="addProfile()">Neues Profil</button>

<label>Intensität:</label>
<input type="range" id="intensity" min="0.3" max="1.2" step="0.1" value="0.8">

<input id="savePrompt" placeholder="Prompt speichern...">
<button onclick="savePromptFunc()">Prompt speichern</button>

<select id="savedPrompts" onchange="loadPrompt()">
  <option value="">Gespeicherte Prompts</option>
</select>

<button onclick="toggleTheme()">Theme wechseln</button>

</div>

<div id="inputArea">
  <textarea id="prompt" placeholder="Schreibe deine Idee..."></textarea>
  <button onclick="generateStory()">Senden</button>
  <button id="secondary" onclick="continueStory()">Weiter</button>
  <button id="secondary" onclick="clearChat()">Clear</button>
</div>

<script>
const API_URL = "http://192.168.178.49:1234/api/v1/chat";

let profiles = JSON.parse(localStorage.getItem("profiles") || "[]");
let lastAIText = "";

function saveProfiles() {
  localStorage.setItem("profiles", JSON.stringify(profiles));
}

function renderProfiles() {
  const select = document.getElementById("profiles");
  select.innerHTML = '<option value="">Profil wählen</option>';

  profiles.forEach((p, i) => {
    const opt = document.createElement("option");
    opt.value = i;
    opt.text = p.name;
    select.appendChild(opt);
  });
}

function addProfile() {
  const name = prompt("Name des Charakters:");
  const desc = prompt("Beschreibung:");

  if (!name || !desc) return;

  profiles.push({ name, desc });
  saveProfiles();
  renderProfiles();
}

function getProfileText() {
  const index = document.getElementById("profiles").value;
  if (index === "") return "";
  return profiles[index].desc;
}

function saveChat() {
  localStorage.setItem("chat", document.getElementById("chat").innerHTML);
}

function loadChat() {
  const saved = localStorage.getItem("chat");
  if (saved) document.getElementById("chat").innerHTML = saved;
}

function addMessage(text, type) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  saveChat();
}

function typeText(el, text) {
  let i = 0;
  el.innerText = "";
  function t() {
    if (i < text.length) {
      el.innerText += text[i++];
      setTimeout(t, 8);
    } else {
      lastAIText = text;
      saveChat();
    }
  }
  t();
}

async function sendToAI(userText) {
  const profile = getProfileText();
  const intensity = document.getElementById("intensity").value;

  const system =
    "Antworte auf Deutsch. Schreibe eine intensive Geschichte. " +
    (profile ? "Charakter: " + profile : "");

  const response = await fetch(API_URL, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      messages: [
        {role:"system", content:system},
        {role:"user", content:userText}
      ],
      temperature: parseFloat(intensity),
      max_tokens:600
    })
  });

  return await response.json();
}

async function generateStory() {
  const input = document.getElementById("prompt");
  const text = input.value.trim();
  if (!text) return;

  addMessage(text,"user");
  input.value = "";

  const aiDiv = document.createElement("div");
  aiDiv.className = "message ai";
  aiDiv.innerText = "Generiere...";
  document.getElementById("chat").appendChild(aiDiv);

  try {
    const data = await sendToAI(text);
    typeText(aiDiv, data.choices[0].message.content);
  } catch {
    aiDiv.innerText = "Fehler";
  }
}

async function continueStory() {
  if (!lastAIText) return;

  addMessage("Weiter schreiben","user");

  const aiDiv = document.createElement("div");
  aiDiv.className = "message ai";
  aiDiv.innerText = "Generiere...";
  document.getElementById("chat").appendChild(aiDiv);

  try {
    const data = await sendToAI("Führe die Geschichte logisch weiter:\n" + lastAIText);
    typeText(aiDiv, data.choices[0].message.content);
  } catch {
    aiDiv.innerText = "Fehler";
  }
}

function clearChat() {
  document.getElementById("chat").innerHTML="";
  localStorage.removeItem("chat");
}

function savePromptFunc() {
  const val = document.getElementById("savePrompt").value;
  if (!val) return;

  let list = JSON.parse(localStorage.getItem("prompts") || "[]");
  list.push(val);
  localStorage.setItem("prompts", JSON.stringify(list));
  loadPrompts();
}

function loadPrompts() {
  const select = document.getElementById("savedPrompts");
  select.innerHTML = '<option value="">Gespeicherte Prompts</option>';

  let list = JSON.parse(localStorage.getItem("prompts") || "[]");
  list.forEach(p => {
    let o = document.createElement("option");
    o.value = p;
    o.text = p;
    select.appendChild(o);
  });
}

function loadPrompt() {
  document.getElementById("prompt").value =
    document.getElementById("savedPrompts").value;
}

function toggleTheme() {
  const body = document.body;
  if (body.style.background === "white") {
    body.style.background = "#0f0f0f";
    body.style.color = "#eaeaea";
  } else {
    body.style.background = "white";
    body.style.color = "black";
  }
}

loadChat();
loadPrompts();
renderProfiles();
</script>

</body>
</html>
