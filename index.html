<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>✨ Story ✨</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
  color: white;
}

#app {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
#sidebar {
  width: 250px;
  background: #111122;
  padding: 15px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

#sidebar h2 {
  color: #a855f7;
}

.chatItem {
  padding: 10px;
  margin-bottom: 5px;
  background: #1f1f3a;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
}

.chatActive {
  background: linear-gradient(135deg, #a855f7, #22c55e);
}
  
  /* MAIN */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#chatTitle {
  text-align: center;
  padding: 15px;
  font-size: 20px;
  background: #111122;
  color: #22c55e;
}

/* CHAT */
#chat {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

.message {
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 10px;
  max-width: 60%;
}

.user {
  background: linear-gradient(135deg, #06b6d4, #3b82f6);
  align-self: flex-end;
}

.bot {
  background: #2a2a4a;
}

/* INPUT */
#inputArea {
  display: flex;
  padding: 10px;
  background: #111122;
}

#input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  margin-left: 10px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #a855f7, #22c55e);
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <h2>Chats</h2>
    <div id="chatList"></div>
    <button onclick="neuerChat()">+ Neuer Chat</button>
  </div>

  <!-- MAIN -->
  <div id="main">

    <h2 id="chatTitle">Chat</h2>

    <div id="chat"></div>

    <div id="inputArea">
      <input id="input" placeholder="Schreibe deine Idee...">
      <button onclick="send()">Senden</button>
    </div>

  </div>

</div>

<script>

let chats = [
  { name: "Chat 1", messages: [] }
];
let aktuellerChat = 0;

/* NEUER CHAT */
function neuerChat() {
  const name = prompt("Name für neuen Chat:");

  chats.push({
    name: name || "Chat " + (chats.length + 1),
    messages: []
  });

  aktuellerChat = chats.length - 1;

  updateChatList();
  renderChat();
}

/* CHAT LISTE */
function updateChatList() {
  const list = document.getElementById("chatList");
  list.innerHTML = "";

  chats.forEach((chat, index) => {

    const container = document.createElement("div");
    container.className = "chatItem" + (index === aktuellerChat ? " chatActive" : "");

    const name = document.createElement("span");
    name.innerText = chat.name;

    name.onclick = () => {
      aktuellerChat = index;
      renderChat();
      updateChatList();
    };

    /* UMBENENNEN */
    name.ondblclick = () => {
      const neuerName = prompt("Neuer Name:", chat.name);
      if (neuerName) {
        chat.name = neuerName;
        updateChatList();
        renderChat();
      }
    };

    /* LÖSCHEN */
    const deleteBtn = document.createElement("button");
    deleteBtn.innerText = "✖";
    deleteBtn.style.background = "transparent";
    deleteBtn.style.color = "#ff4d6d";

    deleteBtn.onclick = (e) => {
      e.stopPropagation();

      chats.splice(index, 1);

      if (aktuellerChat >= chats.length) {
        aktuellerChat = chats.length - 1;
      }

      if (chats.length === 0) {
        chats.push({ name: "Chat 1", messages: [] });
        aktuellerChat = 0;
      }

      updateChatList();
      renderChat();
    };

    container.appendChild(name);
    container.appendChild(deleteBtn);
    list.appendChild(container);
  });
}

/* CHAT RENDERN */
function renderChat() {
  const chatDiv = document.getElementById("chat");
  chatDiv.innerHTML = "";

  document.getElementById("chatTitle").innerText = chats[aktuellerChat].name;

  chats[aktuellerChat].messages.forEach(msg => {
    const div = document.createElement("div");
    div.className = "message " + msg.type;
    div.innerText = msg.text;
    chatDiv.appendChild(div);
  });

  chatDiv.scrollTop = chatDiv.scrollHeight;
}

/* SENDEN */
function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();

  if (!text) return;

  chats[aktuellerChat].messages.push({ type: "user", text });

  input.value = "";

  renderChat();

  /* Fake KI Antwort */
  setTimeout(() => {
    const antwort = "✨ Geschichte entsteht...: " + text;

    chats[aktuellerChat].messages.push({
      type: "bot",
      text: antwort
    });

    renderChat();
  }, 500);
}

/* START */
updateChatList();
renderChat();

</script>

</body>
</html>
