<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Dark Story</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f0f1a, #050509);
  color: #eaeaff;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  padding: 15px;
  text-align: center;
  font-size: 20px;
  background: linear-gradient(90deg, #a855f7, #3b82f6, #10b981);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
}

.message {
  max-width: 80%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 15px;
  line-height: 1.5;
  white-space: pre-line;
}

.user {
  background: linear-gradient(90deg, #3b82f6, #10b981);
  margin-left: auto;
}

.ai {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(168,85,247,0.3);
  box-shadow: 0 0 10px rgba(168,85,247,0.2);
}

#controls {
  padding: 10px;
}

select, input {
  width: 100%;
  margin-bottom: 8px;
  padding: 8px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.05);
  color: white;
}

#inputArea {
  display: flex;
  gap: 8px;
  padding: 10px;
}

textarea {
  flex: 1;
  padding: 10px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.05);
  color: white;
}

button {
  padding: 10px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(90deg, #a855f7, #3b82f6, #10b981);
  color: white;
  }
</style>

</head>

<body>

<header>✨ Dark Story ✨</header>

<div id="chat"></div>

<div id="controls">

<select id="profiles"></select>
<button onclick="addProfile()">Neues Profil</button>

<label>Intensität</label>
<input type="range" id="intensity" min="0.3" max="1.2" step="0.1" value="0.8">

</div>

<div id="inputArea">
  <textarea id="prompt" placeholder="Schreibe deine Idee..."></textarea>
  <button onclick="generateStory()">Senden</button>
  <button onclick="continueStory()">Weiter</button>
</div>

<script>
const API_URL = "http://192.168.178.49:1234/api/v1/chat";

let profiles = JSON.parse(localStorage.getItem("profiles") || "[]");
let lastAIText = "";

function saveProfiles() {
  localStorage.setItem("profiles", JSON.stringify(profiles));
}

function renderProfiles() {
  const select = document.getElementById("profiles");
  select.innerHTML = '<option value="">Profil wählen</option>';
  profiles.forEach((p, i) => {
    let opt = document.createElement("option");
    opt.value = i;
    opt.text = p.name;
    select.appendChild(opt);
  });
}

function addProfile() {
  const name = prompt("Name:");
  const desc = prompt("Beschreibung:");
  if (!name || !desc) return;
  profiles.push({name, desc});
  saveProfiles();
  renderProfiles();
}

function getProfile() {
  const i = document.getElementById("profiles").value;
  if (i === "") return "";
  return profiles[i].desc;
}

function addMessage(text, type) {
  const chat = document.getElementById("chat");
  let div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function typeText(el, text) {
  let i = 0;
  el.innerText = "";
  function t(){
    if(i<text.length){
      el.innerText += text[i++];
      setTimeout(t,8);
    } else {
      lastAIText = text;
    }
  }
  t();
}

async function sendToAI(text){
  const profile = getProfile();
  const intensity = document.getElementById("intensity").value;

  const response = await fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      messages:[
        {role:"system", content:"Schreibe auf Deutsch. "+profile},
        {role:"user", content:text}
      ],
      temperature: parseFloat(intensity),
      max_tokens:600
    })
  });

  return await response.json();
}

async function generateStory(){
  const input = document.getElementById("prompt");
  const text = input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value="";

  let aiDiv = document.createElement("div");
  aiDiv.className="message ai";
  aiDiv.innerText="Generiere...";
  document.getElementById("chat").appendChild(aiDiv);

  try{
    const data = await sendToAI(text);
    typeText(aiDiv,data.choices[0].message.content);
  }catch{
    aiDiv.innerText="Fehler";
  }
}

async function continueStory(){
  if(!lastAIText) return;

  addMessage("Weiter","user");

  let aiDiv = document.createElement("div");
  aiDiv.className="message ai";
  aiDiv.innerText="Generiere...";
  document.getElementById("chat").appendChild(aiDiv);

  try{
    const data = await sendToAI("Führe fort:\n"+lastAIText);
    typeText(aiDiv,data.choices[0].message.content);
  }catch{
    aiDiv.innerText="Fehler";
  }
}

renderProfiles();
</script>

</body>
</html>
