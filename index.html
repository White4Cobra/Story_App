<!DOCTYPE html>
<html lang="de">
<head id="chatTitle">Story</header>
<meta charset="UTF-8">
<title>Deine Story</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0b0b1a, #030308);
  color: #eaeaff;
  display: flex;
  height: 100vh;
}

/* LAYOUT */
#app {
  display: flex;
  width: 100%;
}

/* SIDEBAR */
#sidebar {
  width: 260px;
  background: #050510;
  padding: 15px;
  border-right: 1px solid rgba(255,255,255,0.1);
}

.chatItem {
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  background: rgba(255,255,255,0.05);
}

.chatActive {
  background: linear-gradient(135deg, #a855f7, #3b82f6);
}

/* MAIN */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

#chatTitle {
  text-align: center;
  padding: 15px;
  font-size: 20px;
  color: #10b981;
}

/* CHAT */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  max-width: 75%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 18px;
}

.user {
  margin-left: auto;
  background: linear-gradient(135deg, #3b82f6, #10b981);
}

.ai {
  background: rgba(255,255,255,0.05);
}

/* INPUT */
#inputArea {
  display: flex;
  padding: 10px;
  gap: 10px;
}

textarea {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
}

button {
  padding: 10px;
  border-radius: 10px;
  background: linear-gradient(135deg, #a855f7, #3b82f6, #10b981);
  color: white;
}
</style>
</head>

<body>

<div id="app">

<!-- SIDEBAR -->
<div id="sidebar">
  <h2>Chats</h2>
  <div id="chatList"></div>
  <button onclick="neuerChat()">+ Neuer Chat</button>
</div>

<!-- MAIN -->
<div id="main">

<h2 id="chatTitle">Chat</h2>

<div id="chat"></div>

<div id="inputArea">
  <textarea id="prompt"></textarea>
  <button onclick="generateStory()">Senden</button>
</div>

</div>

</div>

<script>
const API_URL = "http://192.168.178.49:1234/v1/chat/completions";

let chats = [
  { name: "Chat 1", messages: [] }
];
let aktuellerChat = 0;

/* CHAT LISTE */
function updateChatList() {
  const list = document.getElementById("chatList");
  list.innerHTML = "";

  chats.forEach((chat, index) => {

    const container = document.createElement("div");
    container.className = "chatItem" + (index === aktuellerChat ? " chatActive" : "");

    const name = document.createElement("span");
    name.innerText = chat.name;

    name.onclick = () => {
      aktuellerChat = index;
      renderChat();
      updateChatList();
    };

    name.ondblclick = () => {
      const n = prompt("Neuer Name:", chat.name);
      if (n) {
        chat.name = n;
        updateChatList();
        renderChat();
      }
    };

    const del = document.createElement("span");
    del.innerText = "✖";

    del.onclick = (e) => {
      e.stopPropagation();
      chats.splice(index,1);

      if (chats.length === 0) {
        chats.push({ name:"Chat 1", messages:[] });
      }

      aktuellerChat = 0;
      updateChatList();
      renderChat();
    };

    container.appendChild(name);
    container.appendChild(del);
    list.appendChild(container);
  });
}

/* RENDER */
function renderChat() {
  const chatDiv = document.getElementById("chat");
  chatDiv.innerHTML = "";

  document.getElementById("chatTitle").innerText =
    chats[aktuellerChat].name;

  chats[aktuellerChat].messages.forEach(msg => {
    const div = document.createElement("div");
    div.className = "message " + msg.type;
    div.innerText = msg.text;
    chatDiv.appendChild(div);
  });
}

/* KI */
async function sendToAI(text){

  const response = await fetch(API_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      model: "lmstudio",
      messages:[
        {role:"system", content:"Du bist eine KI für Geschichten."},
        {role:"user", content:text}
      ]
    })
  });

  const data = await response.json();
  return data;
}

/* SEND */
function senden() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text) return;

  chats[aktuellerChat].messages.push({
    type: "user",
    text: text
  });

  input.value = "";
  renderChat();

  // Fake AI (oder später echte KI)
    chats[aktuellerChat].messages.push({
      type: "ai",
      text: "Dunkle Geschichte entsteht... " + text
    });
    renderChat();
  }, 500);
}

/* NEUER CHAT */
function neuerChat() {
  chats.push({
    name: "Chat " + (chats.length + 1),
    messages: []
  });

  aktuellerChat = chats.length - 1;
  updateChatList();
  renderChat();
}

/* START */
updateChatList();
renderChat();
</script>

</body>
</html>
